# 품질 게이트 CI — 로컬 PostToolUse 훅과 동일한 검사를 원격에서도 강제한다.
# 훅은 각 PC/세션의 편집 시점에만 돈다: CI는 push·PR마다 같은 게이트를
# 깨끗한 환경에서 재실행해, 훅이 없는 경로(직접 push, 다른 기여자)도 막는다.
# 검사 명령은 CLAUDE.md "품질 게이트" 섹션과 일치시킨다(정적 검사 → 테스트).
# 빌드(Vite)는 게이트 범위가 아니므로 넣지 않는다.
name: CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 게이트 1단계: 정적 검사 (no-undef 등 크래시성 오류 — 빌드가 못 잡는 것)
      - name: Lint (static check)
        run: npx eslint src --max-warnings=0

      # 게이트 2단계: 전체 테스트 스위트 (골든셋 포함)
      - name: Test
        run: npx vitest run
