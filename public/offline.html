<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Body Plan — 오프라인</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #141414; color: #f5f5f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 40px 24px; }
    .icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 28px; font-weight: 500; color: #d4af37;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    p { font-size: 14px; color: #707070; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 12px 24px;
      background: #d4af37; color: #141414;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">D</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인한 후<br>다시 시도해 주세요.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">다시 시도</a>
  </div>
</body>
</html>
